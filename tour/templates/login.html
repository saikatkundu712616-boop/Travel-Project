{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/u.css' %}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
  
  <!-- Logo / Brand -->
  <a class="navbar-brand fw-bold" href="/">MyWebsite</a>

  <!-- Mobile button -->
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <!-- Menu -->
  <div class="collapse navbar-collapse" id="navbarNav">
    
    <!-- Left side links -->
    <ul class="navbar-nav me-auto">
      <li class="nav-item">
        <a class="nav-link active" href="/">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/about">About</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Contact</a>
      </li>
    </ul>

    <!-- Right side (Login/Register) -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" href="/login">Login</a>
      </li>
      <li class="nav-item">
        <a class="nav-link btn btn-dark text-primary px-3 ms-2" href="/register">
          Register
        </a>
      </li>
    </ul>

  </div>
</nav>

<form action="/login/" method="POST">
    {% csrf_token %}
  <div class="container">
    <h1>LOG IN FROM</h1>
    <p>Please fill in this form to Log In</p>
    <p style="color: red;">{{ error }}</p>
    <hr>

    <label for="email"><b>Name</b></label>
    <input type="text" placeholder="Enter your name" name="name" id="email" required>

    <label for="psw-repeat"><b> Password</b></label>
    <input type="password" placeholder="Enter your Password" name="password" id="psw-repeat" required>
    <hr>

    <p><label><input type="checkbox" name="terms" required> I agree to terms</label>
</p>
    <button type="submit" class="registerbtn">Login</button>
  </div>
</form>
</body>
</html>
